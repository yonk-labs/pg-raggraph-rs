name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-clippy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check (non-pgrx crates)
        run: cargo check -p pg_raggraph_core -p pg_raggraph_sidecar

      - name: cargo clippy (core + sidecar — non-pgrx crates)
        run: cargo clippy -p pg_raggraph_core -p pg_raggraph_sidecar -- -D warnings

      - name: cargo test (core)
        run: cargo test -p pg_raggraph_core

  pgrx-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: install pgrx build prereqs
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev bison flex libreadline-dev

      - name: install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version =0.17.0

      - name: pgrx init (download + build pg17)
        run: cargo pgrx init --pg17 download

      - name: pgrx test
        run: cargo pgrx test pg17 -p pg_raggraph
