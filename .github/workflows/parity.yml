# Canonical reference copy — mirrored to .github/workflows/parity.yml.
# SC-007: small on PR, medium on main push, large on tag.
# SC-014: compare.py exit code IS the gate (no human in the loop).
# SC-015: pinned Python pg-raggraph installed from requirements.txt.
# NOTE: bench/parity/requirements.txt is GATE-A (user supplies Python pin).
name: parity
on:
  pull_request:
  push:
    branches: [main]
    tags: ['*']

jobs:
  parity:
    runs-on: ubuntu-latest
    services:
      pg:
        image: pgvector/pgvector:pg17
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: pgrg_sidecar_test }
        ports: ['5443:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d pgrg_sidecar_test"
          --health-interval 2s --health-timeout 3s --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Select tier by trigger (SC-007)
        id: tier
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "t=large" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "t=medium" >> "$GITHUB_OUTPUT"
          else
            echo "t=small" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pinned Python pg-raggraph (SC-015)
        run: |
          python -m pip install -r bench/parity/requirements.txt
          pip show pg-raggraph | grep -E '^(Name|Version):'

      - name: Install PostgreSQL build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreadline-dev zlib1g-dev libssl-dev libxml2-dev

      - name: Install cargo-pgrx 0.17.0
        run: cargo install cargo-pgrx --version =0.17.0 --locked

      - name: Init pgrx pg17
        run: cargo pgrx init --pg17 download

      - name: Build + install pg_raggraph extension
        run: |
          cargo pgrx install --package pg_raggraph \
            --pg-config "$(cargo pgrx info pg-config pg17)"

      - name: Resolution parity (SC-005)
        run: cargo test -p pg_raggraph_core --test resolution_parity

      - name: Embedding artifact precheck (SC-008)
        # In full cross-impl CI: provide real model paths via secrets.
        # For smoke verification, point both flags at the same file (identity guard trivially passes).
        run: |
          python bench/parity/precheck.py \
            --fastembed "${FE_PATH:-/tmp/model.onnx}" \
            --chunkshop "${CS_PATH:-/tmp/model.onnx}"
        continue-on-error: false

      - name: Generate tier corpus + fixtures (SC-001/002)
        run: |
          T=${{ steps.tier.outputs.t }}
          python bench/parity/corpus/gen_corpus.py --tier $T \
            --out bench/parity/corpus/$T/docs.jsonl
          python bench/parity/extracted/gen_extracted.py --tier $T \
            --corpus bench/parity/corpus/$T/docs.jsonl \
            --out bench/parity/extracted/$T.jsonl

      - name: Query-set validation (SC-013)
        run: python bench/parity/query_sets/validate_query_sets.py

      - name: Parity run — exit code IS the gate (SC-004/006/014)
        run: |
          python bench/parity/compare.py \
            --tier ${{ steps.tier.outputs.t }} \
            --queries bench/parity/query_sets/${{ steps.tier.outputs.t }}.yaml \
            --top-k 10 --mode hybrid --python lib \
            --report bench/parity/results/ci-${{ github.run_id }}.json
        env:
          PGRG_RUST_DSN: postgresql://postgres:postgres@localhost:5443/pgrg_sidecar_test

      - name: Upload parity report (SC-017 drift downloadable on red)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report-${{ steps.tier.outputs.t }}-${{ github.run_id }}
          path: bench/parity/results/ci-${{ github.run_id }}.json
